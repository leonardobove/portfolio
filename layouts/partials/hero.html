<!-- ══════════════════════════════════════════════════════════════════════════
     Title / Header — Clarity pattern: .container.blog > .blog-title.no-cover
     ══════════════════════════════════════════════════════════════════════════ -->
<div class="container blog" id="first-content" style="background-color: #E0E4E6;">
    <div class="blog-title no-cover">
        <div class="blog-intro">
            <div>
                <h1 class="title">{{ .Site.Params.name }}</h1>
                <p class="author">{{ .Site.Params.title }} &nbsp;·&nbsp; {{ .Site.Params.institution }}</p>
                <p class="abstract">
                    {{ .Site.Params.tagline }}<br><br>
                    {{ .Site.Params.mission }}
                </p>
                <div class="status-badge">
                    <span class="status-dot"></span>
                    Currently: {{ .Site.Params.currently_working_on }}
                </div>
            </div>

            <div class="info">
                <div>
                    <a href="{{ .Site.Params.cv_pdf }}" class="button icon" target="_blank" rel="noopener">
                        Curriculum Vitæ <i class="fa-solid fa-file-pdf"></i>
                    </a>
                    <a href="mailto:{{ .Site.Params.email }}" class="button icon" style="background-color: rgba(0,0,0,0.08);">
                        Email <i class="fa-solid fa-envelope"></i>
                    </a>
                    <a href="https://github.com/{{ .Site.Params.github }}" class="button icon"
                       style="background-color: rgba(0,0,0,0.08);" target="_blank" rel="noopener">
                        GitHub <i class="fa-brands fa-github"></i>
                    </a>
                    <a href="https://linkedin.com/in/{{ .Site.Params.linkedin }}" class="button icon"
                       style="background-color: rgba(0,0,0,0.08);" target="_blank" rel="noopener">
                        LinkedIn <i class="fa-brands fa-linkedin"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
