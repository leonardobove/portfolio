<!-- ══════════════════════════════════════════════════════════════════════════
     Title / Header — Clarity pattern: .container.blog > .blog-title.no-cover
     ══════════════════════════════════════════════════════════════════════════ -->
<div class="container blog" id="first-content" style="background-color: #E0E4E6;">
    <div class="blog-title no-cover">
        <div class="blog-intro">
            <div>
                <h1 class="title">{{ .Site.Params.name }}</h1>
                <p class="author">{{ .Site.Params.title }} &nbsp;·&nbsp; {{ .Site.Params.institution }}</p>
                <p class="abstract">
                    {{ .Site.Params.tagline }}<br><br>
                    {{ .Site.Params.mission }}
                </p>
            </div>
        </div>
    </div>
</div>
